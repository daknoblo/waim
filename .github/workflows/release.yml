# Builds the multi-arch Docker image, publishes it to GitHub Container Registry
# (main -> :stable, develop -> :dev, tags -> versioned) and scans it for
# vulnerabilities.
name: Publish Docker Image (ghcr.io)

on:
  push:
    branches: [main, develop]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  publish:
    name: Build, Push & Scan Image
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4E5 Check out repository"
        uses: actions/checkout@v6

      - name: "\U0001F9F0 Set up QEMU (multi-arch emulation)"
        uses: docker/setup-qemu-action@v3

      - name: "\U0001F3D7\uFE0F Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "\U0001F510 Log in to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "\U0001F551 Compute build version and channel"
        id: buildmeta
        run: |
          echo "version=$(date -u +v%Y%m%d-%H%M)" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            echo "channel=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: "\U0001F3F7\uFE0F Determine image tags & labels"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: "\U0001F433 Build & push multi-arch image (amd64 + arm64)"
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.buildmeta.outputs.version }}
            CHANNEL=${{ steps.buildmeta.outputs.channel }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "\U0001F6E1\uFE0F Scan image for vulnerabilities (Trivy)"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: "\U0001F4E4 Upload scan results to the Security tab"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

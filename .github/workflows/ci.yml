# Runs on every push and pull request to validate code quality before merge:
# checks generated assets, lints, runs tests and compiles the project.
name: Code Checks (Lint, Test & Build)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  verify:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4E5 Check out repository"
        uses: actions/checkout@v6

      - name: "\U0001F527 Set up Go 1.25 (with module cache)"
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: "\U0001F4E6 Install templ code generator"
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020

      - name: "\U0001F50D Check generated templ code is committed"
        run: |
          templ generate
          git diff --exit-code -- '*_templ.go' \
            || (echo "::error::Generated templ code is stale. Run 'make generate' and commit the result." && exit 1)

      - name: "\U0001F50D Check compiled Tailwind CSS is committed"
        run: |
          curl -fsSL https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.17/tailwindcss-linux-x64 -o tailwindcss
          chmod +x tailwindcss
          ./tailwindcss -c tailwind.config.js -i internal/web/assets/input.css -o internal/web/assets/static/app.css --minify
          git diff --exit-code -- internal/web/assets/static/app.css \
            || (echo "::error::Compiled app.css is stale. Run 'make css' and commit the result." && exit 1)

      - name: "\U0001F9EA Static analysis (go vet)"
        run: go vet ./...

      - name: "\U0001F9F9 Lint (golangci-lint)"
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: "\u2705 Run tests (with race detector)"
        run: go test -race ./...

      - name: "\U0001F528 Compile static binary"
        run: CGO_ENABLED=0 go build ./...

version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - misspell
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close

formatters:
  enable:
    - gofmt
